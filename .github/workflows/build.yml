name: Build & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  BLEEDING_EDGE_TAG: "Game4World-BleedingEdge"

jobs:
  getVersionNumber:
    name: Get version number
    runs-on: ubuntu-latest
    outputs:
      baseVersionNumber: ${{ steps.version.outputs.baseVersionNumber }}
      fullVersionNumber: ${{ steps.version.outputs.fullVersionNumber }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          fetch-tags: true
      - name: Extract version and build number
        id: version
        run: |
          version=$(cat Assets/Scripts/VersionNumber.txt | tr -d '\n')
          echo "baseVersionNumber=$version" >> $GITHUB_OUTPUT
          echo "fullVersionNumber=${version}+${{ github.run_number }}" >> $GITHUB_OUTPUT

  buildForAllSupportedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    needs: getVersionNumber
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - Android
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          fetch-tags: true
      - uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/Library
          key: Library-${{ matrix.targetPlatform }}
          restore-keys: |
                Library-${{ matrix.targetPlatform }}-
                Library-
      - if: matrix.targetPlatform == 'Android'
        uses: jlumbroso/free-disk-space@v1.3.1
      - name: Check disk space after cleanup
        run: df -h
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          GITHUB_BUILD_NUMBER: ${{ github.run_number }}
        with:
          dockerWorkspacePath: /github/workspace
          targetPlatform: ${{ matrix.targetPlatform }}
          customParameters: >
            -GITHUB_BUILD_NUMBER ${{ env.GITHUB_BUILD_NUMBER }}
          androidKeystoreName: user.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass:  ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName:  ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass:  ${{ secrets.ANDROID_KEYALIAS_PASS }}
      - name: Rename output APK
        if: matrix.targetPlatform == 'Android'
        run: |
          mkdir -p final/${{ matrix.targetPlatform }}
          cp build/${{ matrix.targetPlatform }}/Android.apk final/${{ matrix.targetPlatform }}/Game4World-${{ needs.getVersionNumber.outputs.fullVersionNumber }}.apk
      - name: Upload Android artifact
        if: matrix.targetPlatform == 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}-Game4World-${{ needs.getVersionNumber.outputs.fullVersionNumber }}
          path: final/${{ matrix.targetPlatform }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - getVersionNumber
      - buildForAllSupportedPlatforms
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          fetch-tags: true
      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Get last BleedingEdge commit
        id: bleed_base
        run: |
          if git rev-parse "${{ env.BLEEDING_EDGE_TAG }}" >/dev/null 2>&1; then
            echo "BLEED_BASE=$(git rev-parse ${BLEEDING_EDGE_TAG})" >> $GITHUB_ENV
          else
            echo "BLEED_BASE=" >> $GITHUB_ENV
          fi
      - name: BleedingEdge release notes
        id: bleed_notes
        run: |
          if [ -z "$BLEED_BASE" ]; then
            notes=$(git log -10 --pretty=format:%B)
          else
            notes=$(git log $BLEED_BASE..HEAD --pretty=format:%B)
          fi
          printf "BLEED_NOTES<<EOF\n%s\nEOF\n" "$notes" >> $GITHUB_OUTPUT
      - name: Remove old BleedingEdge Release
        uses: dev-drprasad/delete-tag-and-release@v0.2.1
        continue-on-error: true
        with:
          delete_release: true
          tag_name: ${{ env.BLEEDING_EDGE_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Force tag BleedingEdge to HEAD
        run: |
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag -f ${{ env.BLEEDING_EDGE_TAG }}
            git push --force origin ${{ env.BLEEDING_EDGE_TAG }}
      - name: Upload BleedingEdge Release
        uses: ncipollo/release-action@v1.16.0
        with:
          artifacts: artifacts/**
          name: 'Game4World Mobile v${{ needs.getVersionNumber.outputs.fullVersionNumber }}'
          body: |
            Bleeding-edge build — автоматическая сборка при каждом пуше в main.

            Версия: `${{ needs.getVersionNumber.outputs.fullVersionNumber }}`

            # Изменения
            ${{ steps.bleed_notes.outputs.BLEED_NOTES }}
          tag: ${{ env.BLEEDING_EDGE_TAG }}
          makeLatest: true
          allowUpdates: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Discord notification
        if: ${{ secrets.DISCORD_WEBHOOK != '' }}
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          content: |
            **Game4World Mobile v${{ needs.getVersionNumber.outputs.fullVersionNumber }}** — новая сборка APK готова.
            Скачать: https://github.com/${{ github.repository }}/releases/tag/${{ env.BLEEDING_EDGE_TAG }}
